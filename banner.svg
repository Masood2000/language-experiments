<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>
  <text x="600" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#e0e0e0">Language Experiments</text>
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8892b0">Learn by experimenting</text>
  <g opacity="0.7" font-family="monospace" font-size="14" fill="#64ffda" text-anchor="start">
    <!-- Row 1: C · C++ · Go · Java · JavaScript -->
    <g transform="translate(310, 220)">
      <text x="0">C</text>
      <circle cx="20" cy="-5" r="2"/>
      <text x="40">C++</text>
      <circle cx="80" cy="-5" r="2"/>
      <text x="100">Go</text>
      <circle cx="130" cy="-5" r="2"/>
      <text x="150">Java</text>
      <circle cx="200" cy="-5" r="2"/>
      <text x="220">JavaScript</text>
    </g>
    <!-- Row 2: Kotlin · Python · Ruby · Rust · Swift -->
    <g transform="translate(330, 250)">
      <text x="0">Kotlin</text>
      <circle cx="60" cy="-5" r="2"/>
      <text x="80">Python</text>
      <circle cx="145" cy="-5" r="2"/>
      <text x="165">Ruby</text>
      <circle cx="210" cy="-5" r="2"/>
      <text x="230">Rust</text>
      <circle cx="275" cy="-5" r="2"/>
      <text x="295">Swift</text>
    </g>
  </g>
</svg>
